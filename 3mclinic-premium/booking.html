<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3M Clinic - Booking Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Montserrat', 'sans-serif']
                    },
                    colors: {
                        'brand-green': '#006039',
                        'brand-coffee': '#9C5426',
                        'brand-cream': '#F4EFE6',
                        'brand-surface': '#FCFAF6',
                        'brand-dark': '#2A2624',
                        'brand-muted': '#9E9892',
                        'brand-border': '#E8DED1'
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #E5E5E5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container { 
            width: 100%; 
            max-width: 400px; 
            background-color: #F4EFE6; 
            min-height: 100vh; 
            position: relative; 
            overflow-x: hidden; 
            overflow-y: auto; 
            padding-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }
        @media (min-width: 400px) { 
            .app-container { 
                min-height: 850px; 
                height: 850px; 
                border-radius: 0px; 
                margin: 20px; 
                border: 1px solid #E8DED1;
            } 
        }
        ::-webkit-scrollbar { display: none; }
        .app-container { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fine-border { border: 1px solid #E8DED1; }
        .fine-border-b { border-bottom: 1px solid #E8DED1; }
        .fine-border-t { border-top: 1px solid #E8DED1; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom date picker styling */
        .date-btn {
            border: 1px solid #E8DED1;
            background: #FCFAF6;
            color: #2A2624;
            transition: all 0.2s ease;
        }
        .date-btn.active {
            background: #006039;
            border-color: #006039;
            color: white;
        }
        .time-slot {
            border: 1px solid #E8DED1;
            background: #FCFAF6;
            color: #2A2624;
            transition: all 0.2s ease;
        }
        .time-slot:hover {
            border-color: #9C5426;
            color: #9C5426;
        }
        .time-slot.active {
            background: #9C5426;
            border-color: #9C5426;
            color: white;
        }
        .time-slot.disabled {
            background: transparent;
            color: #E8DED1;
            border-color: transparent;
            pointer-events: none;
            text-decoration: line-through;
        }
    </style>
</head>
<body class="text-brand-dark antialiased">
    <div class="app-container">
        
        <!-- Header -->
        <header class="px-6 pt-12 pb-4 flex justify-between items-center fine-border-b bg-brand-cream sticky top-0 z-50">
            <a href="services.html" class="w-10 h-10 flex items-center justify-start text-brand-dark">
                <i class="ph-light ph-arrow-left text-[24px]"></i>
            </a>
            <h1 class="text-[10px] font-sans font-medium uppercase tracking-[0.2em] text-brand-dark">Выбор времени</h1>
            <div class="w-10 h-10"></div> <!-- Spacer -->
        </header>

        <!-- Doctor Summary Card -->
        <div class="px-6 mt-6 mb-8">
            <div class="bg-brand-surface fine-border p-4 flex items-center gap-4">
                <div class="w-16 h-16 bg-brand-cream fine-border overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1622253692010-333f2da6031d?q=80&w=400&auto=format&fit=crop" class="w-full h-full object-cover grayscale mix-blend-multiply" style="background-color: rgba(156,84,38,0.1);" alt="Dr. Sokolov">
                </div>
                <div>
                    <span class="text-[9px] font-sans uppercase tracking-[0.1em] text-brand-coffee">Стоматолог-хирург</span>
                    <h2 class="font-serif text-xl text-brand-dark leading-tight mt-1">Дмитрий Соколов</h2>
                    <p class="font-sans text-[10px] text-brand-muted mt-1">Сложное удаление (от 6 000 ₽)</p>
                </div>
            </div>
        </div>

        <!-- Month Selector -->
        <div class="px-6 mb-4 flex justify-between items-center">
            <h3 class="font-serif text-2xl text-brand-green">Май 2026</h3>
            <div class="flex gap-2">
                <button class="w-8 h-8 fine-border bg-brand-surface flex items-center justify-center text-brand-muted"><i class="ph-light ph-caret-left"></i></button>
                <button class="w-8 h-8 fine-border bg-brand-surface flex items-center justify-center text-brand-dark hover:bg-brand-cream"><i class="ph-light ph-caret-right"></i></button>
            </div>
        </div>

        <!-- Horizontal Date Scroll -->
        <div class="flex gap-3 overflow-x-auto hide-scroll px-6 pb-6 border-b border-brand-border mb-6">
            
            <button class="date-btn w-14 shrink-0 flex flex-col items-center justify-center py-3">
                <span class="font-sans text-[9px] uppercase tracking-widest mb-1 opacity-70">Пт</span>
                <span class="font-serif text-2xl">15</span>
            </button>
            
            <button class="date-btn active w-14 shrink-0 flex flex-col items-center justify-center py-3">
                <span class="font-sans text-[9px] uppercase tracking-widest mb-1 opacity-80">Сб</span>
                <span class="font-serif text-2xl">16</span>
            </button>
            
            <button class="date-btn w-14 shrink-0 flex flex-col items-center justify-center py-3">
                <span class="font-sans text-[9px] uppercase tracking-widest mb-1 opacity-70">Вс</span>
                <span class="font-serif text-2xl">17</span>
            </button>
            
            <button class="date-btn w-14 shrink-0 flex flex-col items-center justify-center py-3 opacity-50 cursor-not-allowed">
                <span class="font-sans text-[9px] uppercase tracking-widest mb-1 opacity-70">Пн</span>
                <span class="font-serif text-2xl">18</span>
            </button>
            
            <button class="date-btn w-14 shrink-0 flex flex-col items-center justify-center py-3">
                <span class="font-sans text-[9px] uppercase tracking-widest mb-1 opacity-70">Вт</span>
                <span class="font-serif text-2xl">19</span>
            </button>

            <button class="date-btn w-14 shrink-0 flex flex-col items-center justify-center py-3">
                <span class="font-sans text-[9px] uppercase tracking-widest mb-1 opacity-70">Ср</span>
                <span class="font-serif text-2xl">20</span>
            </button>
        </div>

        <!-- Time Slots Grid -->
        <div class="px-6 mb-24">
            <h4 class="font-sans text-[10px] uppercase tracking-[0.2em] text-brand-muted mb-4">Утро</h4>
            <div class="grid grid-cols-4 gap-2 mb-6">
                <button class="time-slot disabled py-2 text-[13px] font-sans font-medium">09:00</button>
                <button class="time-slot disabled py-2 text-[13px] font-sans font-medium">09:30</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">10:00</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">10:30</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">11:00</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">11:30</button>
            </div>

            <h4 class="font-sans text-[10px] uppercase tracking-[0.2em] text-brand-muted mb-4">День</h4>
            <div class="grid grid-cols-4 gap-2 mb-6">
                <button class="time-slot active py-2 text-[13px] font-sans font-medium">12:00</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">12:30</button>
                <button class="time-slot disabled py-2 text-[13px] font-sans font-medium">13:00</button>
                <button class="time-slot disabled py-2 text-[13px] font-sans font-medium">13:30</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">14:00</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">14:30</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">15:00</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">15:30</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">16:00</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">16:30</button>
                <button class="time-slot disabled py-2 text-[13px] font-sans font-medium">17:00</button>
                <button class="time-slot disabled py-2 text-[13px] font-sans font-medium">17:30</button>
            </div>
            
            <h4 class="font-sans text-[10px] uppercase tracking-[0.2em] text-brand-muted mb-4">Вечер</h4>
            <div class="grid grid-cols-4 gap-2">
                <button class="time-slot py-2 text-[13px] font-sans font-medium">18:00</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">18:30</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">19:00</button>
                <button class="time-slot py-2 text-[13px] font-sans font-medium">19:30</button>
            </div>
        </div>

        <!-- Sticky Bottom CTA -->
        <div class="fixed bottom-0 left-0 w-full bg-brand-cream/95 backdrop-blur-md fine-border-t p-6 pb-8 z-50">
            <div class="max-w-[400px] mx-auto flex gap-4 items-center">
                <div class="flex-1">
                    <p class="font-sans text-[9px] uppercase tracking-[0.1em] text-brand-muted mb-1">16 мая, 12:00</p>
                    <p class="font-serif text-lg text-brand-dark leading-none">от 6 000 ₽</p>
                </div>
                <button class="bg-brand-green text-white font-sans text-[10px] uppercase tracking-[0.15em] font-medium px-8 py-4 hover:bg-brand-coffee transition-colors">
                    Подтвердить
                </button>
            </div>
        </div>

    </div>
</body>
</html>
