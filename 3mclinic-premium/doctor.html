<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3M Clinic - Doctor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        window.tailwind = window.tailwind || {};
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Montserrat', 'sans-serif']
                    },
                    colors: {
                        'brand-green': '#006039',
                        'brand-coffee': '#9C5426',
                        'brand-cream': '#F4EFE6',
                        'brand-surface': '#FCFAF6',
                        'brand-dark': '#2A2624',
                        'brand-muted': '#9E9892',
                        'brand-border': '#E8DED1'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #E5E5E5;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
            font-weight: 500;
            text-rendering: geometricPrecision;
            -webkit-font-smoothing: antialiased;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background-color: #F4EFE6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 120px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }
        @media (min-width: 400px) {
            .app-container { min-height: 850px; height: 850px; border: 1px solid #E8DED1; margin-top: 20px; margin-bottom: 20px; overflow-y: auto; }
        }
        .app-container::-webkit-scrollbar { display: none; }
        .app-container { -ms-overflow-style: none; scrollbar-width: none; }
        .font-sans { font-weight: 600; }
        .font-serif { font-weight: 600; }
        .font-bold { font-weight: 700; }
        .text-brand-muted { color: #625B54 !important; }
        .text-\[8px\] { font-size: 9px; }
        .text-\[9px\] { font-size: 10px; }
        .text-\[10px\] { font-size: 10.5px; }
        .fine-border { border: 1px solid #E8DED1; }
        .fine-border-b { border-bottom: 1px solid #E8DED1; }
        .fine-border-t { border-top: 1px solid #E8DED1; }
    </style>
</head>
<body class="text-brand-dark antialiased">
    <div class="app-container">
        <header class="px-6 pt-10 pb-4 bg-brand-cream sticky top-0 z-40 fine-border-b">
            <div class="flex items-center justify-between">
                <a href="index-active.html" class="w-10 h-10 flex items-center justify-start text-brand-dark hover:text-brand-green transition-colors" aria-label="Назад">
                    <i class="ph-light ph-arrow-left text-[28px]"></i>
                </a>
                <p class="font-sans text-[10px] uppercase tracking-[0.2em] text-brand-dark">Специалист</p>
                <a id="header-booking-link" href="booking.html" class="w-10 h-10 flex items-center justify-end text-brand-green hover:text-brand-coffee transition-colors" aria-label="Записаться">
                    <i class="ph-light ph-calendar-plus text-[26px]"></i>
                </a>
            </div>
        </header>

        <main class="px-6 pt-6">
            <section class="mb-8">
                <div id="doctor-photo-wrap" class="w-full aspect-[4/5] bg-brand-surface fine-border overflow-hidden mb-6"></div>
                <div class="pb-6 fine-border-b">
                    <p id="doctor-kicker" class="font-sans text-[10px] uppercase tracking-[0.2em] font-bold text-brand-green mb-4"></p>
                    <h1 id="doctor-name" class="font-serif text-4xl text-brand-dark leading-none mb-4"></h1>
                    <p id="doctor-role" class="font-sans text-[11px] uppercase tracking-[0.12em] leading-relaxed text-brand-muted"></p>
                </div>
            </section>

            <section id="doctor-experience-card" class="py-5 fine-border-b mb-2 hidden">
                <div class="flex items-baseline justify-between gap-4">
                    <p class="font-sans text-[10px] uppercase tracking-[0.2em] font-bold text-brand-green">Стаж</p>
                    <p id="doctor-experience" class="font-serif text-3xl text-brand-dark leading-none text-right"></p>
                </div>
            </section>

            <section class="py-6 mb-6">
                <p class="font-sans text-[10px] uppercase tracking-[0.2em] font-bold text-brand-green mb-2">О враче</p>
                <div id="doctor-about" class="font-sans text-[12px] leading-relaxed text-brand-muted"></div>
            </section>

            <a id="booking-link" href="booking.html" class="block w-full bg-brand-green text-brand-surface font-sans text-[10px] uppercase tracking-[0.15em] font-bold px-6 py-4 text-center hover:bg-brand-coffee transition-colors">
                Записаться
            </a>
        </main>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 w-full bg-brand-cream/95 backdrop-blur-md fine-border-t flex justify-center z-50">
            <div class="w-full max-w-[400px] flex justify-between items-center px-4 py-4 pb-8">
                <a href="ai.html" class="flex flex-col items-center gap-1.5 text-brand-muted hover:text-brand-dark transition-colors">
                    <i class="ph-light ph-sparkle text-xl"></i>
                    <span class="text-[8px] font-sans uppercase tracking-[0.1em] font-medium">AI</span>
                </a>
                <a href="services.html" class="flex flex-col items-center gap-1.5 text-brand-muted hover:text-brand-dark transition-colors">
                    <i class="ph-light ph-receipt text-xl"></i>
                    <span class="text-[8px] font-sans uppercase tracking-[0.1em] font-medium">Услуги</span>
                </a>
                <a href="index-active.html" class="flex flex-col items-center gap-1.5 text-brand-green">
                    <i class="ph-fill ph-asterisk text-xl"></i>
                    <span class="text-[8px] font-sans uppercase tracking-[0.1em] font-medium">Главная</span>
                </a>
                <a href="visits.html" class="flex flex-col items-center gap-1.5 text-brand-muted hover:text-brand-dark transition-colors">
                    <i class="ph-light ph-calendar-blank text-xl"></i>
                    <span class="text-[8px] font-sans uppercase tracking-[0.1em] font-medium">Визиты</span>
                </a>
                <a href="profile.html" class="flex flex-col items-center gap-1.5 text-brand-muted hover:text-brand-dark transition-colors">
                    <i class="ph-light ph-user text-xl"></i>
                    <span class="text-[8px] font-sans uppercase tracking-[0.1em] font-medium">Профиль</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const doctors = {
            murtuzaliev: {
                name: 'Муртузалиев Шамиль Шахбанович',
                shortName: 'Ш. Муртузалиев',
                role: 'Стоматолог-терапевт, хирург, ортопед',
                experience: '14 лет',
                photo: 'assets/doctor-murtuzaliev.jpeg',
                scope: 'Стоматолог-терапевт, хирург, ортопед',
                about: [
                    'Специализируется на терапевтическом, хирургическом и ортопедическом лечении зубов любой сложности.',
                    'Проводит лечение кариеса, пульпита, периодонтита, удаление зубов и ортопедическое восстановление зубного ряда.',
                    'Работает с современными методами диагностики и лечения.',
                    'Выполняет комплексный подход к восстановлению функции и эстетики улыбки.',
                    'Внимательно относится к каждому пациенту и подбирает оптимальный план лечения.'
                ]
            },
            kombo: {
                name: 'Комбо Делан',
                shortName: 'Д. Комбо',
                role: 'Стоматолог-терапевт',
                experience: '',
                photo: 'assets/doctor-kombo.jpeg',
                scope: 'Стоматолог-терапевт',
                about: [
                    'Проводит терапевтический прием и помогает пациентам с лечением зубов, диагностикой и профилактикой заболеваний полости рта.'
                ]
            },
            rabadanova: {
                name: 'Рабаданова Зайнаб Магомедовна',
                shortName: 'З. Рабаданова',
                role: 'Главный врач, Стоматолог-терапевт',
                experience: 'более 21 года',
                photo: '',
                scope: 'Главный врач, Стоматолог-терапевт',
                about: [
                    'Окончила Дагестанскую государственную медицинскую академию по специальности «Стоматология» в 2005 году.',
                    'Прошла клиническую интернатуру по специальности «Стоматология».',
                    'Специализируется на терапевтическом лечении зубов, эстетической реставрации и комплексной диагностике заболеваний полости рта.',
                    'Имеет действующие сертификаты по специальностям «Врач-стоматолог» и «Стоматология общей практики».'
                ]
            }
        };

        const params = new URLSearchParams(window.location.search);
        const doctor = doctors[params.get('id')] || doctors.murtuzaliev;
        const bookingUrl = `booking.html?doctor=${encodeURIComponent(doctor.name)}&role=${encodeURIComponent(doctor.role)}`;

        document.getElementById('doctor-kicker').innerText = doctor.scope;
        document.getElementById('doctor-name').innerText = doctor.name;
        document.getElementById('doctor-role').innerText = doctor.role;
        document.getElementById('booking-link').href = bookingUrl;
        document.getElementById('header-booking-link').href = bookingUrl;
        document.getElementById('doctor-about').innerHTML = doctor.about.map(item => `
            <p class="py-4 fine-border-b">${item}</p>
        `).join('');

        if (doctor.experience) {
            document.getElementById('doctor-experience-card').classList.remove('hidden');
            document.getElementById('doctor-experience').innerText = doctor.experience;
        }

        const photoWrap = document.getElementById('doctor-photo-wrap');
        if (doctor.photo) {
            photoWrap.innerHTML = `<img src="${doctor.photo}" class="w-full h-full object-cover grayscale mix-blend-multiply" style="background-color: rgba(156,84,38,0.1);" alt="${doctor.name}">`;
        } else {
            photoWrap.innerHTML = `
                <div class="w-full h-full flex flex-col items-center justify-center bg-brand-cream text-brand-green">
                    <div class="w-24 h-24 fine-border bg-brand-cream flex items-center justify-center mb-5">
                        <i class="ph-light ph-user text-[52px]"></i>
                    </div>
                    <p class="font-sans text-[10px] uppercase tracking-[0.2em] font-bold">Фото скоро появится</p>
                </div>
            `;
        }
    </script>
</body>
</html>
