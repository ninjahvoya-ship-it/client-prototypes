<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3M Clinic - Rolex Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Montserrat', 'sans-serif']
                    },
                    colors: {
                        'brand-green': '#1A6B2E', /* The requested 3M logo color */
                        'brand-stone': '#D9D4CF', /* Elegant taupe/stone instead of gold */
                        'brand-surface': '#F5F5F4', /* Very soft warm grey for cards */
                        'brand-dark': '#1C1C1C',    /* Deep graphite instead of black */
                        'brand-muted': '#8A8A8A'
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #E5E5E5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container { 
            width: 100%; 
            max-width: 400px; 
            background-color: #F4EFE6; /* Cotton cream */
            min-height: 100vh; 
            position: relative; 
            overflow-x: hidden; 
            overflow-y: auto; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }
        @media (min-width: 400px) { 
            .app-container { 
                min-height: 850px; 
                height: 850px; 
                border-radius: 0px; 
                margin: 20px; 
                border: 1px solid #E8DED1;
            } 
        }
        
        ::-webkit-scrollbar { display: none; }
        .app-container { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Hardcoded palette classes to bypass Tailwind CDN issues */
        .bg-cream { background-color: #F4EFE6 !important; }
        .bg-surface { background-color: #FCFAF6 !important; }
        .bg-rolex { background-color: #006039 !important; }
        .bg-coffee { background-color: #9C5426 !important; }
        .bg-espresso { background-color: #2A2624 !important; }
        
        .text-rolex { color: #006039 !important; }
        .text-coffee { color: #9C5426 !important; }
        .text-espresso { color: #2A2624 !important; }
        .text-cream { color: #F4EFE6 !important; }
        .text-muted-warm { color: #9E9892 !important; }
        
        .border-warm { border-color: #E8DED1 !important; }
        .border-coffee { border-color: #9C5426 !important; }

        /* Fine lines tailored for clinic */
        .fine-border { border: 1px solid #E8DED1 !important; }
        .fine-border-b { border-bottom: 1px solid #E8DED1 !important; }
        .fine-border-t { border-top: 1px solid #E8DED1 !important; }
    </style>
</head>
<body class="text-espresso antialiased">
    <div class="app-container pb-32">
        
        <!-- Header -->
        <header class="px-6 pt-12 pb-4 flex justify-between items-center fine-border-b bg-[#F4EFE6] sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <img src="https://ninjahvoya-ship-it.github.io/client-prototypes/3mclinic/assets/3m-logo.jpg" alt="3M Clinic Logo" class="h-10 object-contain mix-blend-multiply">
            </div>
            <button class="w-10 h-10 flex items-center justify-end text-espresso">
                <i class="ph-light ph-list text-[26px]"></i>
            </button>
        </header>

        <!-- Main Banner -->
        <div class="p-6">
            <div class="w-full aspect-[4/5] relative overflow-hidden bg-surface border border-[#E8DED1]">
                <!-- Image - Clinical/Aesthetic feel -->
                <img src="https://images.unsplash.com/photo-1629909613654-28e377c37b09?q=80&w=1000&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover mix-blend-multiply opacity-60" alt="Clinic Interior">
                
                <!-- Content overlay -->
                <div class="absolute inset-0 p-6 flex flex-col justify-between">
                    <div class="flex justify-between items-start">
                        <span class="text-[9px] uppercase tracking-[0.15em] font-sans text-white bg-rolex px-3 py-1">Premium Patient</span>
                        <div class="w-8 h-8 rounded-full border border-brand-dark/20 flex items-center justify-center backdrop-blur-md">
                            <i class="ph-light ph-qr-code text-espresso"></i>
                        </div>
                    </div>
                    
                    <div class="bg-[#FCFAF6] bg-opacity-95 backdrop-blur-md p-5 border border-[#E8DED1]">
                        <p class="text-[9px] uppercase tracking-[0.2em] font-sans text-muted-warm mb-2">Ваш баланс</p>
                        <div class="flex items-baseline gap-1 mb-5">
                            <h2 class="text-4xl font-serif text-rolex tracking-tight">1 450</h2>
                            <span class="text-lg font-serif text-espresso">₽</span>
                        </div>
                        <button class="bg-brand-green text-white font-sans text-[10px] uppercase tracking-[0.15em] font-medium px-6 py-3 w-full hover:bg-brand-stone transition-colors">
                            Пополнить счет
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Categories -->
        <div class="px-6 mb-8 mt-2">
            <div class="flex items-center gap-2 mb-4">
                <i class="ph-light ph-asterisk text-rolex text-xs"></i>
                <h3 class="font-sans text-[10px] uppercase tracking-[0.2em] text-muted-warm">Направления</h3>
            </div>
            
            <div class="flex flex-col">
                <div class="flex justify-between items-center py-4 fine-border-b cursor-pointer group">
                    <span class="font-serif text-lg text-espresso group-hover:text-rolex transition-colors">Эстетика и отбеливание</span>
                    <i class="ph-light ph-arrow-right text-muted-warm"></i>
                </div>
                <div class="flex justify-between items-center py-4 fine-border-b cursor-pointer group">
                    <span class="font-serif text-lg text-espresso group-hover:text-rolex transition-colors">Терапевтическое лечение</span>
                    <i class="ph-light ph-arrow-right text-muted-warm"></i>
                </div>
                <div class="flex justify-between items-center py-4 fine-border-b cursor-pointer group">
                    <span class="font-serif text-lg text-espresso group-hover:text-rolex transition-colors">Хирургия и имплантология</span>
                    <i class="ph-light ph-arrow-right text-muted-warm"></i>
                </div>
            </div>
        </div>

        <!-- Featured Card -->
        <div class="px-6 mb-8">
            <div class="fine-border p-6 relative bg-surface">
                <div class="flex justify-between items-start mb-6">
                    <h4 class="font-serif text-xl text-espresso">Отбеливание<br>ZOOM4</h4>
                    <span class="text-[9px] uppercase tracking-[0.15em] font-sans text-white bg-rolex px-2 py-1">Хит</span>
                </div>
                
                <p class="font-sans text-[11px] leading-relaxed text-muted-warm mb-6 w-4/5">Клиническая процедура для безопасного и эффективного осветления эмали.</p>
                
                <div class="flex justify-between items-end">
                    <span class="font-serif text-xl text-rolex">15 000 ₽</span>
                    <button class="font-sans text-[9px] uppercase tracking-[0.15em] border border-coffee text-coffee px-4 py-2 hover:bg-coffee hover:text-white transition-colors">Записаться</button>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 w-full bg-[#F4EFE6] bg-opacity-95 backdrop-blur-md fine-border-t flex justify-center z-50">
            <div class="w-full max-w-[400px] flex justify-between items-center px-8 py-4">
                <a href="#" class="flex flex-col items-center gap-1.5 text-rolex">
                    <i class="ph-fill ph-asterisk text-xl"></i>
                    <span class="text-[8px] font-sans uppercase tracking-[0.1em] font-medium">Главная</span>
                </a>
                <a href="#" class="flex flex-col items-center gap-1.5 text-muted-warm hover:text-espresso transition-colors">
                    <i class="ph-light ph-calendar-blank text-xl"></i>
                    <span class="text-[8px] font-sans uppercase tracking-[0.1em] font-medium">Визиты</span>
                </a>
                <a href="#" class="flex flex-col items-center gap-1.5 text-muted-warm hover:text-espresso transition-colors">
                    <i class="ph-light ph-user text-xl"></i>
                    <span class="text-[8px] font-sans uppercase tracking-[0.1em] font-medium">Профиль</span>
                </a>
            </div>
        </div>

    </div>
</body>
</html>
