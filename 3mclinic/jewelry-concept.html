<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3M Clinic - Jewelry Concept</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Montserrat', 'sans-serif']
                    },
                    colors: {
                        'jewel-emerald': '#005d63', /* From brandbook: Noble Emerald */
                        'jewel-black': '#06262d',   /* Gothic Black */
                        'jewel-beige': '#d6d1ca',   /* Champagne Satin */
                        'jewel-gold': '#C8B08A',    /* Matte Gold approximation */
                        'jewel-light': '#F9F8F6',   /* High-end off-white background */
                        'jewel-text': '#1D1D1D',    /* Extremely dark grey, softer than #000 */
                        'jewel-muted': '#7A7A7A'
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #E5E5E5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .app-container { 
            width: 100%; 
            max-width: 400px; 
            background-color: #F9F8F6; 
            min-height: 100vh; 
            position: relative; 
            overflow-x: hidden; 
            overflow-y: auto; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        }
        @media (min-width: 400px) { 
            .app-container { 
                min-height: 850px; 
                height: 850px; 
                border-radius: 0px; /* Sharp corners for luxury feel */
                margin: 20px; 
                border: 1px solid #EAEAEA;
            } 
        }
        
        ::-webkit-scrollbar { display: none; }
        .app-container { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Fine lines */
        .fine-border { border: 0.5px solid rgba(0, 93, 99, 0.2); }
        .fine-border-b { border-bottom: 0.5px solid rgba(0, 93, 99, 0.2); }
        
        .gold-border { border: 0.5px solid #C8B08A; }
    </style>
</head>
<body class="text-jewel-text antialiased">
    <div class="app-container pb-32">
        
        <!-- Header -->
        <header class="px-6 pt-12 pb-4 flex justify-between items-center fine-border-b bg-[#F9F8F6] sticky top-0 z-50">
            <div class="flex flex-col">
                <span class="text-[9px] uppercase tracking-[0.2em] text-jewel-muted font-sans font-medium mb-1">Clinic & Aesthetics</span>
                <h1 class="text-2xl font-serif font-bold text-jewel-emerald italic tracking-wide">3M Clinic</h1>
            </div>
            <button class="w-10 h-10 flex items-center justify-end text-jewel-emerald">
                <i class="ph-light ph-list text-[26px]"></i>
            </button>
        </header>

        <!-- Main Banner -->
        <div class="p-6">
            <div class="w-full aspect-[4/5] relative group overflow-hidden bg-jewel-emerald">
                <!-- Image -->
                <img src="https://images.unsplash.com/photo-1606811841689-23dfddce3e95?q=80&w=1000&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-overlay" alt="Aesthetics">
                
                <!-- Content overlay -->
                <div class="absolute inset-0 p-6 flex flex-col justify-between">
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] uppercase tracking-[0.15em] font-sans text-jewel-beige border border-jewel-beige/30 px-3 py-1">Premium</span>
                        <i class="ph-light ph-sparkle text-jewel-gold text-xl"></i>
                    </div>
                    
                    <div>
                        <p class="text-[10px] uppercase tracking-[0.2em] font-sans text-jewel-beige mb-2">Ваш баланс</p>
                        <div class="flex items-baseline gap-1 mb-6">
                            <h2 class="text-5xl font-serif text-white tracking-tight">1 450</h2>
                            <span class="text-xl font-serif text-jewel-gold">₽</span>
                        </div>
                        <button class="bg-jewel-beige text-jewel-emerald font-sans text-[10px] uppercase tracking-[0.15em] font-medium px-6 py-3 w-full hover:bg-white transition-colors">
                            Пополнить счет
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section Title -->
        <div class="px-6 mt-4 mb-6">
            <h3 class="font-serif text-2xl italic text-jewel-emerald border-l-2 border-jewel-gold pl-3">Направления</h3>
        </div>

        <!-- Categories (List format instead of pills for luxury) -->
        <div class="px-6 mb-10 flex flex-col">
            <div class="flex justify-between items-center py-4 fine-border-b cursor-pointer group">
                <span class="font-sans text-xs uppercase tracking-[0.1em] text-jewel-text group-hover:text-jewel-emerald transition-colors">Эстетика и отбеливание</span>
                <i class="ph-light ph-arrow-right text-jewel-gold"></i>
            </div>
            <div class="flex justify-between items-center py-4 fine-border-b cursor-pointer group">
                <span class="font-sans text-xs uppercase tracking-[0.1em] text-jewel-text group-hover:text-jewel-emerald transition-colors">Терапия</span>
                <i class="ph-light ph-arrow-right text-jewel-gold"></i>
            </div>
            <div class="flex justify-between items-center py-4 fine-border-b cursor-pointer group">
                <span class="font-sans text-xs uppercase tracking-[0.1em] text-jewel-text group-hover:text-jewel-emerald transition-colors">Имплантология</span>
                <i class="ph-light ph-arrow-right text-jewel-gold"></i>
            </div>
        </div>

        <!-- Featured Card -->
        <div class="px-6 mb-8">
            <div class="fine-border p-6 relative bg-white">
                <span class="absolute -top-3 left-6 bg-[#F9F8F6] px-2 text-[9px] uppercase tracking-[0.15em] font-sans text-jewel-emerald">Популярное</span>
                
                <i class="ph-light ph-diamonds-four text-jewel-gold text-2xl mb-4 block"></i>
                <h4 class="font-serif text-xl text-jewel-emerald mb-2">Отбеливание ZOOM4</h4>
                <p class="font-sans text-[11px] leading-relaxed text-jewel-muted mb-6">Безопасная клиническая процедура для идеальной улыбки.</p>
                
                <div class="flex justify-between items-end">
                    <span class="font-serif italic text-lg text-jewel-text">15 000 ₽</span>
                    <button class="font-sans text-[9px] uppercase tracking-[0.15em] border border-jewel-emerald text-jewel-emerald px-4 py-2 hover:bg-jewel-emerald hover:text-white transition-colors">Записаться</button>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 w-full bg-[#F9F8F6]/95 backdrop-blur-md fine-border-b border-t flex justify-center z-50">
            <div class="w-full max-w-[400px] flex justify-between items-center px-8 py-4">
                <a href="#" class="flex flex-col items-center gap-1.5 text-jewel-emerald">
                    <i class="ph-fill ph-diamonds-four text-xl"></i>
                    <span class="text-[8px] font-sans uppercase tracking-[0.1em] font-medium">Главная</span>
                </a>
                <a href="#" class="flex flex-col items-center gap-1.5 text-jewel-muted hover:text-jewel-emerald transition-colors">
                    <i class="ph-light ph-calendar-blank text-xl"></i>
                    <span class="text-[8px] font-sans uppercase tracking-[0.1em] font-medium">Визиты</span>
                </a>
                <a href="#" class="flex flex-col items-center gap-1.5 text-jewel-muted hover:text-jewel-emerald transition-colors">
                    <i class="ph-light ph-user text-xl"></i>
                    <span class="text-[8px] font-sans uppercase tracking-[0.1em] font-medium">Профиль</span>
                </a>
            </div>
        </div>

    </div>
</body>
</html>
