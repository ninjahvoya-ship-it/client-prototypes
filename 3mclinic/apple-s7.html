<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3M Clinic | Apple x S7 Green</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        apple: {
                            bg: '#F2F2F7', /* Classic iOS gray background */
                            card: '#FFFFFF',
                            text: '#000000',
                            grayText: '#8A8A8E',
                        },
                        brandGreen: '#1B8C4A', /* Strict logo color */
                        cobalt_unused: {
                            main: '#1B3A8C',
                            light: '#2955C5',
                            soft: '#E8ECF5' /* Tinted background for icons */
                        }
                    },
                    boxShadow: {
                        'ios': '0 4px 20px rgba(0, 0, 0, 0.05)',
                        'ios-lg': '0 10px 30px rgba(0, 0, 0, 0.08)',
                        's7-glow': '0 8px 24px rgba(196, 214, 0, 0.4)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #F2F2F7; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 400px; margin: 0 auto; background-color: #F2F2F7; min-height: 100vh; position: relative; padding-bottom: 120px; overflow: hidden; }
        ::-webkit-scrollbar { display: none; }
        
        .header-glass {
            background: rgba(242, 242, 247, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .tabbar-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .s7-gradient {
            background: linear-gradient(135deg, #1B3A8C 0%, #2955C5 100%);
        }

        /* Editorial typography rules inside Apple cards */
        .ed-subtitle {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8A8A8E;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- Header (Apple Glass) -->
        <header class="px-5 pt-12 pb-3 flex justify-between items-center sticky top-0 z-50 header-glass">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center font-bold text-[14px] text-apple-text shadow-sm border border-gray-100">
                    АВ
                </div>
                <div>
                    <h1 class="text-[17px] font-bold text-apple-text leading-tight tracking-tight">3M Clinic</h1>
                    <p class="text-[12px] text-apple-grayText font-medium">Анна Ветютнева</p>
                </div>
            </div>
            <button class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-apple-text shadow-sm border border-gray-100">
                <i class="ph-bold ph-bell text-[20px]"></i>
            </button>
        </header>

        <main class="px-5 mt-2 space-y-6">

            <!-- Wallet Card (Apple shape + Cobalt color) -->
            <div class="s7-gradient rounded-[24px] p-6 text-apple-text shadow-s7-glow relative overflow-hidden cursor-pointer hover:scale-[1.02] transition-transform">
                <div class="absolute -right-4 -top-4 w-32 h-32 bg-white/10 rounded-full blur-2xl z-0"></div>
                
                <div class="relative z-10 flex justify-between items-start mb-6">
                    <div>
                        <span class="bg-white/50 text-apple-text px-2.5 py-1 text-[10px] font-bold uppercase rounded-md tracking-wider backdrop-blur-sm inline-block mb-2">Premium</span>
                        <p class="text-[13px] font-medium text-apple-text/80">Ваш баланс</p>
                    </div>
                    <div class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center shadow-sm">
                        <i class="ph-bold ph-qr-code text-xl text-apple-text"></i>
                    </div>
                </div>
                
                <div class="relative z-10 flex items-baseline gap-1.5">
                    <h2 class="text-[44px] font-bold leading-none tracking-tight text-apple-text">1 450</h2>
                    <span class="text-[20px] font-semibold text-apple-text/80">₽</span>
                </div>
            </div>

            <!-- Categories (Apple Scroll + Editorial Badges) -->
            <div>
                <div class="flex gap-2 overflow-x-auto pb-2 -mx-5 px-5">
                    <div class="bg-s7-main text-white px-5 py-2.5 rounded-full text-[14px] font-semibold shadow-sm shrink-0 cursor-pointer">Лечение</div>
                    <div class="bg-white text-apple-text px-5 py-2.5 rounded-full text-[14px] font-medium shadow-sm border border-black/5 shrink-0 cursor-pointer hover:bg-gray-50 transition-colors">Отбеливание</div>
                    <div class="bg-white text-apple-text px-5 py-2.5 rounded-full text-[14px] font-medium shadow-sm border border-black/5 shrink-0 cursor-pointer hover:bg-gray-50 transition-colors">Брекеты</div>
                    <div class="bg-white text-apple-text px-5 py-2.5 rounded-full text-[14px] font-medium shadow-sm border border-black/5 shrink-0 cursor-pointer hover:bg-gray-50 transition-colors">Детям</div>
                </div>
            </div>

            <!-- Services Grid (Apple Cards + Editorial Icons) -->
            <div>
                <h3 class="ed-subtitle mb-3 px-1">Популярные услуги</h3>
                <div class="grid grid-cols-2 gap-3">
                    
                    <div class="bg-apple-card rounded-[24px] p-5 shadow-ios border border-black/5 flex flex-col justify-between h-[140px] cursor-pointer hover:border-s7-main transition-colors relative">
                        <span class="absolute top-3 left-3 bg-s7-soft text-s7-main text-[9px] font-bold uppercase px-2 py-1 rounded-full">Хит</span>
                        <div class="w-full flex justify-end">
                            <i class="ph-light ph-sparkle text-[32px] text-s7-main"></i>
                        </div>
                        <div>
                            <h4 class="text-[14px] font-bold text-apple-text leading-tight mb-1">Отбеливание<br>ZOOM4</h4>
                            <p class="text-[12px] font-semibold text-apple-grayText">15 000 ₽</p>
                        </div>
                    </div>

                    <div class="bg-apple-card rounded-[24px] p-5 shadow-ios border border-black/5 flex flex-col justify-between h-[140px] cursor-pointer hover:border-s7-main transition-colors">
                        <div class="w-full flex justify-end">
                            <i class="ph-light ph-tooth text-[32px] text-s7-main"></i>
                        </div>
                        <div>
                            <h4 class="text-[14px] font-bold text-apple-text leading-tight mb-1">Лечение<br>кариеса</h4>
                            <p class="text-[12px] font-semibold text-apple-grayText">от 3 500 ₽</p>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Promotion Banner (Apple Widget Style) -->
            <div class="bg-apple-card rounded-[24px] p-5 shadow-ios border border-black/5 flex items-center justify-between cursor-pointer hover:shadow-ios-lg transition-shadow">
                <div class="flex-1">
                    <span class="ed-subtitle text-brandGreen mb-1 block">Акция до 31 мая</span>
                    <h3 class="text-[17px] font-bold text-apple-text leading-tight mb-1">Профосмотр -15%</h3>
                    <p class="text-[13px] text-apple-grayText font-medium">Чистка AirFlow + Фторирование</p>
                </div>
                <div class="w-12 h-12 bg-s7-soft rounded-full flex items-center justify-center text-s7-main shrink-0 ml-4">
                    <i class="ph-bold ph-arrow-right text-xl"></i>
                </div>
            </div>

        </main>

        <!-- Floating Bottom Tab Bar (Apple Frosted Glass) -->
        <div style="position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; z-index: 9999;">
            <div style="width: 100%; max-width: 400px; padding: 0 20px; pointer-events: auto;">
                <div class="tabbar-glass border border-black/5" style="border-radius: 40px; display: flex; justify-content: space-between; align-items: center; padding: 8px 16px;">
                    
                    <a href="#" style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; color: #8A8A8E; text-decoration: none; border-radius: 50%;">
                        <i class="ph ph-house text-[24px]"></i>
                    </a>
                    
                    <a href="#" style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; color: #8A8A8E; text-decoration: none; border-radius: 50%;">
                        <i class="ph ph-receipt text-[24px]"></i>
                    </a>
                    
                    <!-- Center Action (Cobalt) -->
                    <button class="s7-gradient w-12 h-12 rounded-full flex items-center justify-center text-white shadow-s7-glow hover:scale-105 transition-transform mx-2">
                        <i class="ph-bold ph-plus text-[22px]"></i>
                    </button>

                    <a href="#" style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; color: #8A8A8E; text-decoration: none; border-radius: 50%;">
                        <i class="ph ph-calendar-blank text-[24px]"></i>
                    </a>
                    
                    <a href="#" style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; color: #8A8A8E; text-decoration: none; border-radius: 50%;">
                        <i class="ph ph-user text-[24px]"></i>
                    </a>

                </div>
            </div>
        </div>

    </div>

</body>
</html>
