<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3M Clinic | Premium Chocolate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        apple: {
                            bg: '#F8F6F2', /* Warm Ivory / Linen background */
                            card: '#FFFFFF',
                            text: '#2C1E16', /* Dark Espresso instead of pure black */
                            grayText: '#8B7D74', /* Warm grayish brown */
                        },
                        brandGreen: '#1B8C4A', /* Strict logo color */
                        choco: {
                            main: '#4A3122',
                            light: '#5A3E2D',
                            dark: '#382418',
                            soft: '#F2EBE1' /* Beige tint for backgrounds */
                        },
                        sand: {
                            main: '#CBA37E', /* Premium gold/sand accent */
                            light: '#EBE3D5'
                        }
                    },
                    boxShadow: {
                        'ios': '0 4px 20px rgba(0, 0, 0, 0.04)',
                        'ios-lg': '0 10px 30px rgba(0, 0, 0, 0.06)',
                        'choco-glow': '0 12px 24px rgba(56, 36, 24, 0.25)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #F8F6F2; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 400px; margin: 0 auto; background-color: #F8F6F2; min-height: 100vh; position: relative; padding-bottom: 120px; overflow: hidden; }
        ::-webkit-scrollbar { display: none; }
        
        .header-glass {
            background: rgba(248, 246, 242, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .tabbar-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(44, 30, 22, 0.08);
        }

        .choco-gradient {
            background: linear-gradient(135deg, #5A3E2D 0%, #382418 100%);
        }

        /* Editorial typography rules inside Apple cards */
        .ed-subtitle {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8B7D74;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- Header (Apple Glass) -->
        <header class="px-5 pt-12 pb-3 flex justify-between items-center sticky top-0 z-50 header-glass">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-sand-light rounded-full flex items-center justify-center font-bold text-[14px] text-choco-main shadow-sm border border-white">
                    АВ
                </div>
                <div>
                    <h1 class="text-[17px] font-bold text-apple-text leading-tight tracking-tight">3M Clinic</h1>
                    <p class="text-[12px] text-apple-grayText font-medium">Анна Ветютнева</p>
                </div>
            </div>
            <button class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-apple-text shadow-sm border border-sand-light/50">
                <i class="ph-bold ph-bell text-[20px]"></i>
            </button>
        </header>

        <main class="px-5 mt-2 space-y-6">

            <!-- Wallet Card (Apple shape + Chocolate color) -->
            <div class="choco-gradient rounded-[24px] p-6 text-white shadow-choco-glow relative overflow-hidden cursor-pointer hover:scale-[1.02] transition-transform">
                <div class="absolute -right-4 -top-4 w-32 h-32 bg-white/5 rounded-full blur-2xl z-0"></div>
                <div class="absolute -left-10 -bottom-10 w-40 h-40 bg-sand-main/10 rounded-full blur-2xl z-0"></div>
                
                <div class="relative z-10 flex justify-between items-start mb-6">
                    <div>
                        <span class="bg-sand-main text-white px-2.5 py-1 text-[10px] font-bold uppercase rounded-md tracking-wider inline-block mb-2 shadow-sm">VIP Client</span>
                        <p class="text-[13px] font-medium text-white/70">Ваш баланс</p>
                    </div>
                    <div class="w-10 h-10 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center border border-white/10 shadow-sm">
                        <i class="ph-bold ph-qr-code text-xl text-white"></i>
                    </div>
                </div>
                
                <div class="relative z-10 flex items-baseline gap-1.5">
                    <h2 class="text-[44px] font-bold leading-none tracking-tight text-white drop-shadow-sm">1 450</h2>
                    <span class="text-[20px] font-semibold text-sand-main">₽</span>
                </div>
            </div>

            <!-- Quick Actions (2x2 Grid) -->
            <div class="mt-8">
                <h3 class="text-[17px] font-bold text-apple-text mb-4 px-1">Чем мы можем помочь?</h3>
                
                <div class="grid grid-cols-2 gap-3">
                    
                    <!-- Top Left: Chocolate -->
                    <div class="bg-choco-main rounded-[32px] p-5 flex flex-col justify-center h-[160px] cursor-pointer hover:scale-105 transition-transform shadow-choco-glow">
                        <span class="text-sand-main text-[10px] font-black uppercase tracking-wider mb-2">Онлайн</span>
                        <h4 class="text-[18px] font-bold text-white leading-tight">Запись<br>на приём</h4>
                    </div>

                    <!-- Top Right: White/Beige -->
                    <div class="bg-white rounded-[32px] p-5 flex flex-col justify-center h-[160px] cursor-pointer hover:scale-105 transition-transform shadow-ios border border-sand-light/30">
                        <span class="text-apple-grayText text-[10px] font-black uppercase tracking-wider mb-2">История</span>
                        <h4 class="text-[18px] font-bold text-apple-text leading-tight">Мои<br>приёмы</h4>
                    </div>

                    <!-- Bottom Left: White/Beige -->
                    <div class="bg-white rounded-[32px] p-5 flex flex-col justify-center h-[160px] cursor-pointer hover:scale-105 transition-transform shadow-ios border border-sand-light/30">
                        <span class="text-apple-grayText text-[10px] font-black uppercase tracking-wider mb-2">Специалисты</span>
                        <h4 class="text-[18px] font-bold text-apple-text leading-tight">Мои<br>врачи</h4>
                    </div>

                    <!-- Bottom Right: White/Beige -->
                    <div class="bg-white rounded-[32px] p-5 flex flex-col justify-center h-[160px] cursor-pointer hover:scale-105 transition-transform shadow-ios border border-sand-light/30">
                        <span class="text-apple-grayText text-[10px] font-black uppercase tracking-wider mb-2">Документы</span>
                        <h4 class="text-[18px] font-bold text-apple-text leading-tight">План<br>лечения</h4>
                    </div>

                </div>
            </div>

            <!-- Promotion Banner (Apple Widget Style) -->
            <div class="mt-8 bg-apple-card rounded-[24px] p-5 shadow-ios border border-sand-light/30 flex items-center justify-between cursor-pointer hover:shadow-ios-lg transition-shadow">
                <div class="flex-1">
                    <span class="ed-subtitle text-sand-main mb-1 block">Акция до 31 мая</span>
                    <h3 class="text-[17px] font-bold text-apple-text leading-tight mb-1">Профосмотр -15%</h3>
                    <p class="text-[13px] text-apple-grayText font-medium">Чистка AirFlow + Фторирование</p>
                </div>
                <div class="w-12 h-12 bg-choco-soft rounded-full flex items-center justify-center text-choco-main shrink-0 ml-4 border border-sand-light/50">
                    <i class="ph-bold ph-arrow-right text-xl"></i>
                </div>
            </div>

        </main>

        <!-- Floating Bottom Tab Bar (Apple Frosted Glass) -->
        <div style="position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; z-index: 9999;">
            <div style="width: 100%; max-width: 400px; padding: 0 20px; pointer-events: auto;">
                <div class="tabbar-glass border border-sand-light/30" style="border-radius: 40px; display: flex; justify-content: space-between; align-items: center; padding: 8px 16px;">
                    
                    <a href="#" style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; color: #8B7D74; text-decoration: none; border-radius: 50%;">
                        <i class="ph-fill ph-house text-[24px] text-choco-main"></i>
                    </a>
                    
                    <a href="#" style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; color: #8B7D74; text-decoration: none; border-radius: 50%;">
                        <i class="ph ph-receipt text-[24px]"></i>
                    </a>
                    
                    <!-- Center Action (Chocolate) -->
                    <button class="choco-gradient w-12 h-12 rounded-full flex items-center justify-center text-white shadow-choco-glow hover:scale-105 transition-transform mx-2 border border-white/10">
                        <i class="ph-bold ph-plus text-[22px]"></i>
                    </button>

                    <a href="#" style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; color: #8B7D74; text-decoration: none; border-radius: 50%;">
                        <i class="ph ph-calendar-blank text-[24px]"></i>
                    </a>
                    
                    <a href="#" style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; color: #8B7D74; text-decoration: none; border-radius: 50%;">
                        <i class="ph ph-user text-[24px]"></i>
                    </a>

                </div>
            </div>
        </div>

    </div>

</body>
</html>
