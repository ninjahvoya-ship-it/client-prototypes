<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3M Clinic | Визиты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        apple: {
                            bg: '#FFFFFF',
                            card: '#FFFFFF',
                            text: '#000000',
                            grayText: '#8A8A8E',
                            brand: '#7ED6A5',
                            brandHover: '#56D38E',
                            brandLight: '#E9F2E9',
                            brandDark: '#3B8B60',
                        }
                    },
                    borderRadius: { '4xl': '32px' },
                    boxShadow: {
                        'ios': '0 2px 10px rgba(0, 0, 0, 0.04)',
                        'brand': '0 8px 24px rgba(126, 214, 165, 0.3)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            display: flex;
            justify-content: center;
            background-color: #E5E7EB;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
            background-color: #FFFFFF;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow-x: hidden;
            padding-bottom: 90px;
        }
        ::-webkit-scrollbar { display: none; }
        
        .header-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .tabbar-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        /* Segmented Control Styles */
        .segmented-control {
            background: #E9F2E9; /* brandLight */
            border-radius: 10px;
            padding: 3px;
            display: flex;
            position: relative;
        }
        .segmented-btn {
            flex: 1;
            text-align: center;
            padding: 7px 0;
            font-size: 13px;
            font-weight: 600;
            color: #3B8B60; /* brandDark */
            position: relative;
            z-index: 10;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .segmented-btn.active {
            color: #FFFFFF;
        }
        .segmented-indicator {
            position: absolute;
            top: 3px;
            bottom: 3px;
            width: calc(50% - 3px);
            background: #7ED6A5; /* brand */
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(126, 214, 165, 0.4);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- 1. Header -->
        <header class="px-5 pt-10 pb-4 sticky top-0 header-glass z-50">
            <h1 class="text-[28px] font-extrabold tracking-wide text-apple-text leading-none mb-4">Мои визиты</h1>
            
            <!-- Segmented Control -->
            <div class="segmented-control">
                <div class="segmented-indicator" style="transform: translateX(0);"></div>
                <div class="segmented-btn active" onclick="switchTab(0)">Предстоящие</div>
                <div class="segmented-btn" onclick="switchTab(1)">Прошедшие</div>
            </div>
        </header>

        <main class="px-5 mt-4 space-y-6">

            <!-- TAB 1: Upcoming -->
            <div id="tab-upcoming" class="space-y-4">
                
                <!-- Запись 1 (Семья) -->
                <div class="bg-white rounded-[24px] p-5 shadow-ios border border-gray-100 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1.5 h-full bg-apple-brand"></div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="text-apple-brandDark font-bold text-[14px] flex items-center gap-1.5 mb-1">
                                <i class="ph-bold ph-calendar-check"></i> Завтра • 14:30
                            </div>
                            <span class="bg-blue-50 text-blue-500 px-2 py-0.5 rounded-md text-[10px] font-bold uppercase tracking-wider flex items-center gap-1 w-max">
                                <i class="ph-fill ph-baby"></i> Сын (Ваня)
                            </span>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400">
                            <i class="ph-fill ph-tooth text-xl"></i>
                        </div>
                    </div>
                    
                    <h3 class="text-xl font-bold mb-1 text-apple-text leading-tight">Комплексная гигиена</h3>
                    <p class="text-[13px] text-apple-grayText font-medium mb-5 flex items-center gap-1.5">
                        <i class="ph-fill ph-user-circle text-lg opacity-60"></i> Магомедова И.М.
                    </p>
                    
                    <div class="flex gap-2">
                        <button class="flex-1 bg-white border border-gray-200 text-apple-text py-2.5 rounded-xl text-[13px] font-bold hover:bg-gray-50 transition-colors shadow-sm">
                            Перенести
                        </button>
                        <button class="flex-1 bg-white border border-red-200 text-red-500 py-2.5 rounded-xl text-[13px] font-bold hover:bg-red-50 transition-colors shadow-sm">
                            Отменить
                        </button>
                    </div>
                </div>

                <!-- Запись 2 (Своя) -->
                <div class="bg-white rounded-[24px] p-5 shadow-ios border border-gray-100 relative overflow-hidden">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="text-apple-text font-bold text-[14px] flex items-center gap-1.5 mb-1">
                                <i class="ph-bold ph-calendar-blank text-apple-grayText"></i> 22 Мая, ПТ • 10:00
                            </div>
                            <span class="bg-gray-100 text-apple-grayText px-2 py-0.5 rounded-md text-[10px] font-bold uppercase tracking-wider flex items-center gap-1 w-max">
                                Вы
                            </span>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400">
                            <i class="ph-fill ph-bandaids text-xl"></i>
                        </div>
                    </div>
                    
                    <h3 class="text-xl font-bold mb-1 text-apple-text leading-tight">Профосмотр и снимок</h3>
                    <p class="text-[13px] text-apple-grayText font-medium mb-5 flex items-center gap-1.5">
                        <i class="ph-fill ph-user-circle text-lg opacity-60"></i> Магеррамов Б.А.
                    </p>
                    
                    <div class="flex gap-2">
                        <button class="flex-1 bg-white border border-gray-200 text-apple-text py-2.5 rounded-xl text-[13px] font-bold hover:bg-gray-50 transition-colors shadow-sm">
                            Перенести
                        </button>
                        <button class="flex-1 bg-white border border-red-200 text-red-500 py-2.5 rounded-xl text-[13px] font-bold hover:bg-red-50 transition-colors shadow-sm">
                            Отменить
                        </button>
                    </div>
                </div>

            </div>

            <!-- TAB 2: Past (Hidden by default) -->
            <div id="tab-past" class="space-y-4" style="display: none;">
                
                <div class="bg-white rounded-[24px] p-5 shadow-ios border border-gray-100 opacity-80">
                    <div class="flex justify-between items-center mb-3">
                        <div class="text-apple-grayText font-medium text-[13px]">
                            12 Апр 2026
                        </div>
                        <span class="bg-green-50 text-green-600 px-2 py-0.5 rounded-md text-[10px] font-bold uppercase tracking-wider">
                            Выполнен
                        </span>
                    </div>
                    
                    <h3 class="text-lg font-bold mb-1 text-apple-text leading-tight">Лечение кариеса</h3>
                    <p class="text-[13px] text-apple-grayText font-medium mb-4 flex items-center gap-1.5">
                        <i class="ph-fill ph-user-circle text-lg opacity-60"></i> Магомедова И.М.
                    </p>
                    
                    <div class="pt-4 border-t border-gray-100 flex gap-2">
                        <button class="flex-1 bg-apple-brandLight text-apple-brandDark py-2.5 rounded-xl text-[13px] font-bold hover:bg-apple-brand hover:text-white transition-colors flex items-center justify-center gap-1.5">
                            <i class="ph-bold ph-arrow-counter-clockwise"></i> Повторить запись
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-[24px] p-5 shadow-ios border border-gray-100 opacity-80">
                    <div class="flex justify-between items-center mb-3">
                        <div class="text-apple-grayText font-medium text-[13px]">
                            28 Мар 2026
                        </div>
                        <span class="bg-green-50 text-green-600 px-2 py-0.5 rounded-md text-[10px] font-bold uppercase tracking-wider">
                            Выполнен
                        </span>
                    </div>
                    
                    <h3 class="text-lg font-bold mb-1 text-apple-text leading-tight">Первичная консультация</h3>
                    <p class="text-[13px] text-apple-grayText font-medium mb-4 flex items-center gap-1.5">
                        <i class="ph-fill ph-user-circle text-lg opacity-60"></i> Магеррамов Б.А.
                    </p>
                    
                    <div class="pt-4 border-t border-gray-100 flex gap-2">
                        <button class="flex-1 bg-gray-100 text-apple-text py-2.5 rounded-xl text-[13px] font-bold hover:bg-gray-200 transition-colors flex items-center justify-center gap-1.5">
                            <i class="ph-bold ph-file-text"></i> План лечения
                        </button>
                    </div>
                </div>

            </div>

        </main>

        <!-- iOS Bottom Tab Bar -->
        <nav class="fixed bottom-0 w-full max-w-[400px] tabbar-glass px-6 py-2 pb-6 flex justify-between items-center z-50">
            <button class="flex flex-col items-center gap-1 text-apple-grayText hover:text-apple-text transition-colors">
                <i class="ph ph-house text-[26px]"></i>
                <span class="text-[10px] font-medium">Главная</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-apple-grayText hover:text-apple-text transition-colors">
                <i class="ph ph-receipt text-[26px]"></i>
                <span class="text-[10px] font-medium">Услуги</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-apple-brandDark">
                <i class="ph-fill ph-calendar-blank text-[26px]"></i>
                <span class="text-[10px] font-semibold">Визиты</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-apple-grayText hover:text-apple-text transition-colors">
                <i class="ph ph-user text-[26px]"></i>
                <span class="text-[10px] font-medium">Профиль</span>
            </button>
        </nav>

    </div>

    <script>
        function switchTab(index) {
            const indicator = document.querySelector('.segmented-indicator');
            const btns = document.querySelectorAll('.segmented-btn');
            
            // Move indicator
            indicator.style.transform = `translateX(${index * 100}%)`;
            
            // Update button styles
            btns.forEach((btn, i) => {
                if(i === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            // Show/Hide content
            if (index === 0) {
                document.getElementById('tab-upcoming').style.display = 'block';
                document.getElementById('tab-past').style.display = 'none';
            } else {
                document.getElementById('tab-upcoming').style.display = 'none';
                document.getElementById('tab-past').style.display = 'block';
            }
        }
    </script>
</body>
</html>
