<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3M Clinic | Lifestyle Pop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        bg: '#FFFFFF', 
                        text: '#1C1C1E',
                        muted: '#8E8E93',
                        /* Pop colors based on the toothbrushes */
                        accentPink: '#FF2E7E',
                        accentYellow: '#FFD500',
                        accentCyan: '#00C7E5',
                        brandGreen: '#1B8C4A', /* Kept ONLY for tiny details and logo */
                    },
                    boxShadow: {
                        'card': '0 8px 24px rgba(0,0,0,0.06)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            background-color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background-color: #FFFFFF;
            min-height: 100vh;
            position: relative;
            padding-bottom: 120px;
        }
        ::-webkit-scrollbar { display: none; }
        
        .pill-tag {
            border-radius: 40px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .brush-card {
            border-radius: 32px;
            overflow: hidden;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- Header -->
        <header class="px-6 pt-12 pb-4 flex justify-between items-center bg-white sticky top-0 z-50">
            <div class="flex items-center">
                <!-- Keep logo green to respect the brand -->
                <h1 class="text-[26px] font-black tracking-tighter text-brandGreen flex items-center leading-none">
                    3M<span class="text-[12px] font-bold tracking-normal text-muted ml-1.5 mt-1">стоматология</span>
                </h1>
            </div>
            <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-text font-bold">
                АВ
            </div>
        </header>

        <main class="px-6 mt-2 space-y-8">

            <!-- Welcome / Balance Hero (Yellow + Pink vibe) -->
            <div class="brush-card bg-accentYellow p-6 text-text shadow-card cursor-pointer hover:scale-[1.02] transition-transform">
                <div class="flex justify-between items-start mb-6 relative z-10">
                    <div>
                        <span class="bg-white text-text px-3 py-1.5 text-[10px] pill-tag shadow-sm inline-block mb-3">Карта лояльности</span>
                        <h2 class="text-[32px] font-black leading-none tracking-tight">1 450 <span class="text-[20px]">₽</span></h2>
                    </div>
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm">
                        <i class="ph-bold ph-qr-code text-2xl text-text"></i>
                    </div>
                </div>
                <div class="relative z-10">
                    <p class="text-[14px] font-bold">Накоплено баллов</p>
                    <p class="text-[12px] font-medium opacity-80 mt-1">Оплачивайте до 50% чека</p>
                </div>
                
                <!-- Abstract deco -->
                <div class="absolute -right-8 -bottom-8 w-40 h-40 bg-[#FFEA66] rounded-full z-0"></div>
            </div>

            <!-- Categories / Quick Actions (Color block style) -->
            <div>
                <h3 class="text-[18px] font-black text-text mb-4">Услуги</h3>
                <div class="grid grid-cols-2 gap-3">
                    
                    <!-- Pink Block -->
                    <div class="bg-accentPink rounded-[28px] p-5 text-white flex flex-col justify-between h-[130px] cursor-pointer hover:scale-105 transition-transform shadow-card">
                        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center mb-2">
                            <i class="ph-fill ph-sparkle text-xl"></i>
                        </div>
                        <h4 class="text-[16px] font-black leading-snug">Отбеливание<br>ZOOM4</h4>
                    </div>

                    <!-- Cyan Block -->
                    <div class="bg-accentCyan rounded-[28px] p-5 text-white flex flex-col justify-between h-[130px] cursor-pointer hover:scale-105 transition-transform shadow-card">
                        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center mb-2">
                            <i class="ph-fill ph-warning-circle text-xl"></i>
                        </div>
                        <h4 class="text-[16px] font-black leading-snug">Лечение<br>кариеса</h4>
                    </div>

                    <!-- Light Gray Blocks for contrast -->
                    <div class="bg-gray-100 rounded-[28px] p-5 text-text flex flex-col justify-between h-[130px] cursor-pointer hover:scale-105 transition-transform">
                        <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center mb-2 shadow-sm">
                            <i class="ph-fill ph-baby text-xl text-accentPink"></i>
                        </div>
                        <h4 class="text-[16px] font-black leading-snug">Детям</h4>
                    </div>

                    <div class="bg-gray-100 rounded-[28px] p-5 text-text flex flex-col justify-between h-[130px] cursor-pointer hover:scale-105 transition-transform">
                        <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center mb-2 shadow-sm">
                            <i class="ph-fill ph-smiley text-xl text-accentCyan"></i>
                        </div>
                        <h4 class="text-[16px] font-black leading-snug">Брекеты</h4>
                    </div>

                </div>
            </div>

            <!-- Doctors (Like beauty experts) -->
            <div>
                <h3 class="text-[18px] font-black text-text mb-4">Наши врачи</h3>
                
                <div class="bg-gray-50 rounded-[28px] p-2 flex items-center shadow-card mb-3 cursor-pointer hover:bg-gray-100 transition-colors">
                    <div class="w-[80px] h-[80px] bg-gray-200 rounded-[22px] overflow-hidden shrink-0">
                        <img src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover grayscale">
                    </div>
                    <div class="ml-4 flex-1">
                        <h4 class="text-[16px] font-black text-text">Магомедова И.М.</h4>
                        <p class="text-[12px] font-bold text-accentPink mt-0.5">Терапевт, Гигиенист</p>
                    </div>
                    <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm mr-2 text-text">
                        <i class="ph-bold ph-caret-right"></i>
                    </div>
                </div>

                <div class="bg-gray-50 rounded-[28px] p-2 flex items-center shadow-card cursor-pointer hover:bg-gray-100 transition-colors">
                    <div class="w-[80px] h-[80px] bg-gray-200 rounded-[22px] overflow-hidden shrink-0">
                        <img src="https://images.unsplash.com/photo-1622253692010-333f2da6031d?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover grayscale">
                    </div>
                    <div class="ml-4 flex-1">
                        <h4 class="text-[16px] font-black text-text">Магеррамов Б.А.</h4>
                        <p class="text-[12px] font-bold text-accentCyan mt-0.5">Хирург, Имплантолог</p>
                    </div>
                    <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm mr-2 text-text">
                        <i class="ph-bold ph-caret-right"></i>
                    </div>
                </div>
            </div>

        </main>

        <!-- Floating Action Button (Main CTA) -->
        <div style="position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 9999;">
            <div style="width: 100%; max-width: 360px; padding: 0 20px;">
                <button class="w-full bg-text text-white py-4 rounded-full text-[16px] font-black shadow-[0_10px_30px_rgba(0,0,0,0.2)] hover:scale-[1.02] transition-transform">
                    Записаться на приём
                </button>
            </div>
        </div>

    </div>

</body>
</html>
