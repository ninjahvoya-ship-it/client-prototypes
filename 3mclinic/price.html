<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3M Clinic | Price</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        apple: {
                            bg: '#F2F2F7',
                            card: '#FFFFFF',
                            text: '#000000',
                            grayText: '#8A8A8E',
                        },
                        brandGreen: '#1B8C4A', /* 3M Logo color */
                        
                        /* Client Palette (Vivid Berry & Lime) */
                        vividBerry: '#EC1864',
                        vividLime: '#AEE229',
                        softBlue: '#6077D4',
                        lightBlue: '#DAF5F9',
                        softPink: '#FFD1E4',
                    },
                    boxShadow: {
                        'ios': '0 4px 20px rgba(0, 0, 0, 0.05)',
                        'berry-glow': '0 8px 24px rgba(236, 24, 100, 0.3)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #F2F2F7; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 400px; margin: 0 auto; background-color: #F2F2F7; min-height: 100vh; position: relative; padding-bottom: 120px; overflow: hidden; }
        ::-webkit-scrollbar { display: none; }
        
        .header-glass {
            background: rgba(242, 242, 247, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .tabbar-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        /* Accordion transition */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0;
        }
        .accordion-content.expanded {
            max-height: 300px; /* arbitrary large enough height */
            opacity: 1;
        }
        .accordion-icon {
            transition: transform 0.3s ease;
        }
        .accordion-icon.rotated {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- Header -->
        <header class="px-5 pt-12 pb-3 flex items-center justify-between sticky top-0 z-50 header-glass">
            <div>
                <h1 class="text-[26px] font-bold text-apple-text leading-tight tracking-tight">Прейскурант</h1>
            </div>
            <button class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-apple-text shadow-sm border border-gray-100">
                <i class="ph-bold ph-magnifying-glass text-[20px]"></i>
            </button>
        </header>

        <main class="px-5 mt-4 space-y-4">

            <!-- Expanded Accordion Card (Осмотр / консультация) -->
            <div class="bg-white rounded-[24px] shadow-ios border border-black/5 overflow-hidden">
                <!-- Header (Clickable) -->
                <div class="p-5 flex items-center justify-between cursor-pointer" onclick="toggleAccordion(this)">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-softPink rounded-xl flex items-center justify-center text-vividBerry shrink-0">
                            <i class="ph-fill ph-first-aid text-xl"></i>
                        </div>
                        <h3 class="text-[16px] font-bold text-apple-text tracking-tight">Осмотр / консультация</h3>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 accordion-icon rotated">
                        <i class="ph-bold ph-caret-down text-sm"></i>
                    </div>
                </div>

                <!-- Expanded Content -->
                <div class="accordion-content expanded bg-white">
                    <div class="px-5 pb-5">
                        
                        <div class="flex justify-between items-center py-3 border-t border-gray-100">
                            <p class="text-[14px] font-medium text-apple-text">Первичный осмотр</p>
                            <span class="text-[14px] font-bold text-vividLime bg-vividBerry px-2 py-0.5 rounded-md uppercase text-[10px] tracking-wider">Бесплатно</span>
                        </div>
                        
                        <div class="flex justify-between items-center py-3 border-t border-gray-100">
                            <p class="text-[14px] font-medium text-apple-text max-w-[60%] leading-snug">Консультация специалиста</p>
                            <span class="text-[14px] font-bold text-vividBerry">500–1000 ₽</span>
                        </div>
                        
                        <div class="flex justify-between items-center py-3 border-t border-gray-100">
                            <p class="text-[14px] font-medium text-apple-text max-w-[60%] leading-snug">Составление плана лечения</p>
                            <span class="text-[14px] font-bold text-vividBerry">от 500 ₽</span>
                        </div>

                        <!-- Berry Button -->
                        <button class="w-full bg-vividBerry/10 text-vividBerry mt-4 py-3.5 rounded-[16px] font-bold text-[14px] hover:bg-vividBerry/20 transition-colors">
                            Записаться
                        </button>

                    </div>
                </div>
            </div>

            <!-- Closed Accordion Card 1 -->
            <div class="bg-white rounded-[24px] shadow-ios border border-black/5 overflow-hidden">
                <div class="p-5 flex items-center justify-between cursor-pointer" onclick="toggleAccordion(this)">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-vividLime/20 rounded-xl flex items-center justify-center text-[#7A9E1C] shrink-0">
                            <i class="ph-fill ph-tooth text-xl"></i>
                        </div>
                        <h3 class="text-[16px] font-bold text-apple-text tracking-tight">Удаление зуба</h3>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 accordion-icon">
                        <i class="ph-bold ph-caret-down text-sm"></i>
                    </div>
                </div>
                <!-- Content (Hidden) -->
                <div class="accordion-content bg-white">
                    <div class="px-5 pb-5">
                        <div class="flex justify-between items-center py-3 border-t border-gray-100">
                            <p class="text-[14px] font-medium text-apple-text">Простое удаление</p>
                            <span class="text-[14px] font-bold text-vividBerry">2 500 ₽</span>
                        </div>
                        <div class="flex justify-between items-center py-3 border-t border-gray-100">
                            <p class="text-[14px] font-medium text-apple-text">Сложное удаление</p>
                            <span class="text-[14px] font-bold text-vividBerry">4 000 ₽</span>
                        </div>
                        <button class="w-full bg-vividBerry/10 text-vividBerry mt-4 py-3.5 rounded-[16px] font-bold text-[14px] hover:bg-vividBerry/20 transition-colors">Записаться</button>
                    </div>
                </div>
            </div>

            <!-- Closed Accordion Card 2 -->
            <div class="bg-white rounded-[24px] shadow-ios border border-black/5 overflow-hidden">
                <div class="p-5 flex items-center justify-between cursor-pointer" onclick="toggleAccordion(this)">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-softPink rounded-xl flex items-center justify-center text-vividBerry shrink-0">
                            <i class="ph-fill ph-sparkle text-xl"></i>
                        </div>
                        <h3 class="text-[16px] font-bold text-apple-text tracking-tight">Профессиональная чистка</h3>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 accordion-icon">
                        <i class="ph-bold ph-caret-down text-sm"></i>
                    </div>
                </div>
            </div>

            <!-- Closed Accordion Card 3 -->
            <div class="bg-white rounded-[24px] shadow-ios border border-black/5 overflow-hidden">
                <div class="p-5 flex items-center justify-between cursor-pointer" onclick="toggleAccordion(this)">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-vividLime/20 rounded-xl flex items-center justify-center text-[#7A9E1C] shrink-0">
                            <i class="ph-fill ph-bandaids text-xl"></i>
                        </div>
                        <h3 class="text-[16px] font-bold text-apple-text tracking-tight">Имплантация</h3>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 accordion-icon">
                        <i class="ph-bold ph-caret-down text-sm"></i>
                    </div>
                </div>
            </div>

            <!-- Closed Accordion Card 4 -->
            <div class="bg-white rounded-[24px] shadow-ios border border-black/5 overflow-hidden">
                <div class="p-5 flex items-center justify-between cursor-pointer" onclick="toggleAccordion(this)">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-softPink rounded-xl flex items-center justify-center text-vividBerry shrink-0">
                            <i class="ph-fill ph-smiley text-xl"></i>
                        </div>
                        <h3 class="text-[16px] font-bold text-apple-text tracking-tight">Исправление прикуса</h3>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 accordion-icon">
                        <i class="ph-bold ph-caret-down text-sm"></i>
                    </div>
                </div>
            </div>

        </main>

        <!-- Floating Bottom Tab Bar (Apple Frosted Glass) -->
        <div style="position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; z-index: 9999;">
            <div style="width: 100%; max-width: 400px; padding: 0 20px; pointer-events: auto;">
                <div class="tabbar-glass border border-black/5" style="border-radius: 40px; display: flex; justify-content: space-between; align-items: center; padding: 8px 16px;">
                    
                    <a href="index.html" style="display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8A8A8E; text-decoration: none;">
                        <i class="ph-fill ph-house text-[22px]"></i>
                    </a>
                    
                    <a href="price.html" style="display: flex; flex-direction: column; align-items: center; gap: 4px; color: #EC1864; text-decoration: none;">
                        <i class="ph-fill ph-receipt text-[22px]"></i>
                    </a>
                    
                    <!-- Center Action (Vivid Berry) -->
                    <button class="bg-vividBerry w-12 h-12 rounded-full flex items-center justify-center text-white shadow-berry-glow hover:scale-105 transition-transform mx-2">
                        <i class="ph-bold ph-plus text-[22px]"></i>
                    </button>

                    <a href="visits.html" style="display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8A8A8E; text-decoration: none;">
                        <i class="ph ph-calendar-blank text-[22px]"></i>
                    </a>
                    
                    <a href="profile.html" style="display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8A8A8E; text-decoration: none;">
                        <i class="ph ph-user text-[22px]"></i>
                    </a>

                </div>
            </div>
        </div>

    </div>

    <script>
        function toggleAccordion(headerElement) {
            const content = headerElement.nextElementSibling;
            const icon = headerElement.querySelector('.accordion-icon');
            
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                icon.classList.remove('rotated');
            } else {
                // Optionally close others
                // document.querySelectorAll('.accordion-content').forEach(el => {
                //     el.classList.remove('expanded');
                //     el.previousElementSibling.querySelector('.accordion-icon').classList.remove('rotated');
                // });
                
                content.classList.add('expanded');
                icon.classList.add('rotated');
            }
        }
    </script>
</body>
</html>
