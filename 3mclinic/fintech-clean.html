<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3M Clinic | Clean Pastel Soft-UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        bg: '#F8F9FB', /* Very soft, clean off-white */
                        text: '#1E1E1E',
                        muted: '#8B8B8B',
                        /* Colors from Image 3 */
                        brandBlue: '#6488DB', 
                        pastelPurple: '#B8C2F2',
                        pastelPink: '#F4B5D0',
                        pastelYellow: '#F6E07D',
                        pastelMint: '#A7E0CD',
                    },
                    boxShadow: {
                        'soft': '0 10px 30px rgba(0, 0, 0, 0.04)',
                        'float': '0 16px 32px rgba(100, 136, 219, 0.25)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            background-color: #F8F9FB;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background-color: #F8F9FB;
            min-height: 100vh;
            position: relative;
            padding-bottom: 120px;
            overflow: hidden;
        }
        ::-webkit-scrollbar { display: none; }
        
        .avatar-ring {
            padding: 2px;
            border: 2px solid transparent;
            border-radius: 50%;
            background-color: white;
            transition: border-color 0.2s;
        }
        .avatar-ring.active {
            border-color: #6488DB;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- 1. Header -->
        <header class="px-5 pt-12 pb-2 flex justify-between items-start">
            <div>
                <p class="text-[14px] font-medium text-muted mb-0.5">Доброе утро,</p>
                <h1 class="text-[28px] font-bold text-text leading-none tracking-tight">Анна</h1>
            </div>
            <button class="w-10 h-10 rounded-full flex items-center justify-center text-muted hover:bg-gray-100 transition-colors">
                <i class="ph-bold ph-gear text-[22px]"></i>
            </button>
        </header>

        <main class="mt-4 space-y-8">

            <!-- 2. Моя семья -->
            <div>
                <h2 class="text-[16px] font-semibold text-text px-5 mb-4 tracking-tight">Моя семья</h2>
                <div class="flex gap-4 overflow-x-auto pb-2 -mx-5 px-5">
                    
                    <!-- Анна (Я) -->
                    <div class="flex flex-col items-center gap-1.5 cursor-pointer">
                        <div class="avatar-ring active w-[68px] h-[68px]">
                            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=150&auto=format&fit=crop" class="w-full h-full rounded-full object-cover">
                        </div>
                        <div class="text-center">
                            <p class="text-[13px] font-semibold text-text">Анна</p>
                            <p class="text-[11px] font-medium text-muted">Я</p>
                        </div>
                    </div>

                    <!-- Дмитрий (Муж) -->
                    <div class="flex flex-col items-center gap-1.5 cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
                        <div class="avatar-ring w-[68px] h-[68px]">
                            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=150&auto=format&fit=crop" class="w-full h-full rounded-full object-cover">
                        </div>
                        <div class="text-center">
                            <p class="text-[13px] font-semibold text-text">Дмитрий</p>
                            <p class="text-[11px] font-medium text-muted">Муж</p>
                        </div>
                    </div>

                    <!-- Артём (Сын) -->
                    <div class="flex flex-col items-center gap-1.5 cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
                        <div class="avatar-ring w-[68px] h-[68px]">
                            <img src="https://images.unsplash.com/photo-1519238263530-99abad111f4b?q=80&w=150&auto=format&fit=crop" class="w-full h-full rounded-full object-cover">
                        </div>
                        <div class="text-center">
                            <p class="text-[13px] font-semibold text-text">Артём</p>
                            <p class="text-[11px] font-medium text-muted">Сын</p>
                        </div>
                    </div>

                </div>
            </div>

            <!-- 3. Ваш баланс (Solid Color Band from Image 3) -->
            <div class="px-5">
                <div class="bg-brandBlue rounded-[24px] p-6 text-white relative overflow-hidden shadow-float cursor-pointer hover:scale-[1.02] transition-transform">
                    <div class="flex justify-between items-center mb-6">
                        <p class="text-[13px] font-medium text-white/80">Ваш баланс</p>
                        <span class="bg-white text-brandBlue px-3 py-1 rounded-full text-[11px] font-bold tracking-wide">Золотая карта</span>
                    </div>
                    
                    <div class="flex items-baseline gap-1.5 mb-6">
                        <h3 class="text-[36px] font-bold text-white tracking-tight leading-none">2 500</h3>
                        <span class="text-[20px] font-bold text-white/80">₽</span>
                    </div>

                    <div class="bg-white/10 rounded-[16px] p-4 flex items-center justify-between">
                        <p class="text-[13px] font-medium text-white/90">Кешбэк на все услуги</p>
                        <span class="text-[15px] font-bold text-white">7%</span>
                    </div>
                </div>
            </div>

            <!-- 4. 2x2 Grid (Pastel colors from Image 3) -->
            <div class="px-5">
                <div class="grid grid-cols-2 gap-3">
                    
                    <!-- Запись на приём (Purple) -->
                    <div class="bg-pastelPurple rounded-[24px] p-4 flex flex-col justify-between h-[120px] cursor-pointer hover:scale-105 transition-transform">
                        <div class="w-10 h-10 rounded-full bg-white/40 text-[#5F6BA6] flex items-center justify-center text-xl">
                            <i class="ph-bold ph-plus"></i>
                        </div>
                        <h4 class="text-[15px] font-bold text-[#5F6BA6] leading-snug">Запись<br>на приём</h4>
                    </div>

                    <!-- Мои приёмы (Mint) -->
                    <div class="bg-pastelMint rounded-[24px] p-4 flex flex-col justify-between h-[120px] relative cursor-pointer hover:scale-105 transition-transform">
                        <div class="absolute top-4 right-4 w-6 h-6 bg-white text-[#4A8C74] rounded-full flex items-center justify-center text-[12px] font-bold shadow-sm">6</div>
                        <div class="w-10 h-10 rounded-full bg-white/40 text-[#4A8C74] flex items-center justify-center text-xl">
                            <i class="ph-bold ph-calendar-blank"></i>
                        </div>
                        <h4 class="text-[15px] font-bold text-[#4A8C74] leading-snug">Мои<br>приёмы</h4>
                    </div>

                    <!-- Мои врачи (Pink) -->
                    <div class="bg-pastelPink rounded-[24px] p-4 flex flex-col justify-between h-[120px] cursor-pointer hover:scale-105 transition-transform">
                        <div class="w-10 h-10 rounded-full bg-white/40 text-[#A65F80] flex items-center justify-center text-xl">
                            <i class="ph-fill ph-user"></i>
                        </div>
                        <h4 class="text-[15px] font-bold text-[#A65F80] leading-snug">Мои<br>врачи</h4>
                    </div>

                    <!-- План лечения (Yellow) -->
                    <div class="bg-pastelYellow rounded-[24px] p-4 flex flex-col justify-between h-[120px] cursor-pointer hover:scale-105 transition-transform">
                        <div class="w-10 h-10 rounded-full bg-white/40 text-[#A69240] flex items-center justify-center text-xl">
                            <i class="ph-fill ph-first-aid"></i>
                        </div>
                        <h4 class="text-[15px] font-bold text-[#A69240] leading-snug">План<br>лечения</h4>
                    </div>

                </div>
            </div>

            <!-- 5. Актуальное (White overlapping card style from Image 3) -->
            <div class="px-5 pb-6">
                <h2 class="text-[16px] font-semibold text-text mb-3 tracking-tight">Актуальное</h2>
                
                <div class="bg-white rounded-[24px] p-5 shadow-soft cursor-pointer hover:scale-[1.02] transition-transform">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-[18px] font-bold text-text">Профосмотр</h3>
                        <span class="bg-[#F0FAFF] text-[#6488DB] px-3 py-1 rounded-full text-[11px] font-bold">Акция</span>
                    </div>
                    <p class="text-[13px] text-muted mb-4 font-medium leading-relaxed max-w-[90%]">Запишитесь на чистку со скидкой 15% до конца месяца</p>
                    <button class="bg-brandBlue text-white w-full py-3 rounded-[16px] text-[14px] font-bold hover:bg-opacity-90 transition-colors">
                        Записаться
                    </button>
                </div>
            </div>

        </main>

        <!-- Floating Bottom Tab Bar -->
        <div style="position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; z-index: 9999;">
            <div style="width: 100%; max-width: 360px; padding: 0 20px;">
                <div class="bg-white" style="border-radius: 24px; display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.06);">
                    
                    <a href="#" style="display: flex; flex-direction: column; align-items: center; gap: 4px; color: #6488DB; text-decoration: none;">
                        <i class="ph-fill ph-house text-[22px]"></i>
                    </a>
                    
                    <a href="#" style="display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8B8B8B; text-decoration: none;">
                        <i class="ph ph-clock-counter-clockwise text-[22px]"></i>
                    </a>
                    
                    <div style="margin-top: -30px;">
                        <button class="w-14 h-14 rounded-full flex items-center justify-center text-white bg-brandBlue shadow-float hover:scale-105 transition-transform border-[4px] border-[#F8F9FB]">
                            <i class="ph-bold ph-plus text-[22px]"></i>
                        </button>
                    </div>

                    <a href="#" style="display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8B8B8B; text-decoration: none;">
                        <i class="ph ph-first-aid text-[22px]"></i>
                    </a>
                    
                    <a href="#" style="display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8B8B8B; text-decoration: none;">
                        <i class="ph ph-chat-circle text-[22px]"></i>
                    </a>

                </div>
            </div>
        </div>

    </div>

</body>
</html>
