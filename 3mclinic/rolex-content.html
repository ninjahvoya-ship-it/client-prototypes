<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3M Clinic | Lilac Editorial Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        bg: '#FFFFFF',
                        text: '#000000',
                        muted: '#999999',
                        brandGreen: '#1B8C4A', /* Keeping logo 3M */
                        appleGreen: '#B4D43D', /* ZY Lime Green */
                        appleYellow: '#E4F419',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            margin: 0; 
            background-color: #E5E5E5; 
            font-family: 'Montserrat', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        .app-container { 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto; 
            background: #F4EFE6; 
            min-height: 100vh; 
            position: relative; 
            padding-bottom: 120px; 
            overflow: hidden; 
            
        }
        .app-container { width: 100%; max-width: 400px; margin: 0 auto; background-color: #FFFFFF; min-height: 100vh; position: relative; padding-bottom: 120px; overflow: hidden; }
        ::-webkit-scrollbar { display: none; }
        
        /* ZY UI Elements */
        .zy-card { background: #FFFFFF; border: 1px solid #E8DED1; border-radius: 16px; }
        .zy-badge { background: #000000; color: #FFFFFF; font-weight: 700; text-transform: uppercase; font-size: 10px; padding: 4px 8px; border-radius: 4px; letter-spacing: 0.5px; }
        .zy-pill { border: 1px solid #E8DED1; border-radius: 20px; font-weight: 600; font-size: 13px; color: #000; padding: 8px 16px; }
        .zy-pill.active { background: #000000; color: #FFFFFF; border-color: #006039; }
        
        /* The signature brand green gradient */
        .zy-lime { background: linear-gradient(135deg, #006039 0%, #004026 100%); }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- Header -->
        <header class="px-5 pt-12 pb-4 flex justify-between items-center sticky top-0 bg-[#F4EFE6] z-50 border-b border-[#E8DED1]">
            <div class="flex items-center gap-3">
                <img src="https://ninjahvoya-ship-it.github.io/client-prototypes/3mclinic/assets/3m-logo.jpg" alt="3M Clinic Logo" class="h-8 object-contain mix-blend-multiply">
            </div>

    </div>

</body>
</html>
