<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3M Clinic | Acid Pop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        bg: '#FFFFFF', 
                        text: '#1C1C1E',
                        muted: '#8E8E93',
                        brandGreen: '#1B8C4A', /* 3M Logo color */
                        
                        /* Client Palette */
                        acidLime: '#EAF153',
                        acidPink: '#FECDE0',
                        acidYellow: '#FDD12A',
                        acidBlue: '#41B3E7',
                        acidCream: '#FFF6CF',
                    },
                    boxShadow: {
                        'card': '0 8px 24px rgba(0,0,0,0.06)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #FFFFFF; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 400px; margin: 0 auto; background-color: #FFFFFF; min-height: 100vh; position: relative; padding-bottom: 120px; overflow: hidden; }
        ::-webkit-scrollbar { display: none; }
        .card { border-radius: 28px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- Header -->
        <header class="px-6 pt-12 pb-4 flex justify-between items-center sticky top-0 z-50 bg-white/90 backdrop-blur-md">
            <div class="flex items-center">
                <!-- Keep logo green to respect the brand -->
                <h1 class="text-[26px] font-black tracking-tighter text-brandGreen flex items-center leading-none">
                    3M<span class="text-[12px] font-bold tracking-normal text-muted ml-1.5 mt-1">стоматология</span>
                </h1>
            </div>
            <div class="w-11 h-11 bg-acidCream rounded-full flex items-center justify-center text-text font-bold shadow-sm border border-acidYellow/20">
                АВ
            </div>
        </header>

        <main class="px-6 mt-2 space-y-6">

            <!-- Hero: Acid Yellow Balance Card -->
            <div class="bg-acidYellow rounded-[32px] p-6 text-text shadow-[0_12px_30px_rgba(253,209,42,0.3)] relative overflow-hidden cursor-pointer hover:scale-[1.02] transition-transform">
                <div class="absolute -right-8 -bottom-8 w-40 h-40 bg-white/30 rounded-full blur-2xl z-0"></div>
                
                <div class="relative z-10 flex justify-between items-start mb-8">
                    <div>
                        <span class="bg-white text-text px-3 py-1 text-[11px] font-black uppercase rounded-full shadow-sm inline-block mb-2 tracking-wider">Premium</span>
                        <p class="text-[13px] font-bold text-text/80">Ваш баланс</p>
                    </div>
                    <div class="w-12 h-12 bg-white rounded-[16px] flex items-center justify-center shadow-sm">
                        <i class="ph-bold ph-qr-code text-2xl text-text"></i>
                    </div>
                </div>
                
                <div class="relative z-10 flex items-baseline gap-1.5">
                    <h2 class="text-[44px] font-black leading-none tracking-tighter">1 450</h2>
                    <span class="text-[20px] font-bold">₽</span>
                </div>
            </div>

            <!-- Categories Grid -->
            <div>
                <h3 class="text-[18px] font-black text-text mb-3 px-1">Услуги</h3>
                <div class="grid grid-cols-2 gap-3">
                    
                    <div class="bg-acidPink card p-4 flex flex-col items-start h-[120px] justify-between cursor-pointer hover:scale-105 transition-transform border border-acidPink">
                        <div class="w-12 h-12 bg-white rounded-[16px] flex items-center justify-center text-[24px] text-text shadow-sm">
                            <i class="ph-fill ph-sparkle"></i>
                        </div>
                        <h4 class="text-[15px] font-black text-text">Отбеливание</h4>
                    </div>

                    <div class="bg-acidBlue card p-4 flex flex-col items-start h-[120px] justify-between cursor-pointer hover:scale-105 transition-transform border border-acidBlue">
                        <div class="w-12 h-12 bg-white rounded-[16px] flex items-center justify-center text-[24px] text-acidBlue shadow-sm">
                            <i class="ph-fill ph-tooth"></i>
                        </div>
                        <h4 class="text-[15px] font-black text-white">Лечение</h4>
                    </div>

                    <div class="bg-acidCream card p-4 flex flex-col items-start h-[120px] justify-between cursor-pointer hover:scale-105 transition-transform border border-acidYellow/20">
                        <div class="w-12 h-12 bg-white rounded-[16px] flex items-center justify-center text-[24px] text-[#D4B01A] shadow-sm">
                            <i class="ph-fill ph-smiley"></i>
                        </div>
                        <h4 class="text-[15px] font-black text-text">Брекеты</h4>
                    </div>

                    <div class="bg-acidLime card p-4 flex flex-col items-start h-[120px] justify-between cursor-pointer hover:scale-105 transition-transform border border-acidLime">
                        <div class="w-12 h-12 bg-white rounded-[16px] flex items-center justify-center text-[24px] text-[#A6AD12] shadow-sm">
                            <i class="ph-fill ph-baby"></i>
                        </div>
                        <h4 class="text-[15px] font-black text-text">Детям</h4>
                    </div>

                </div>
            </div>

            <!-- Appointment -->
            <div>
                <h3 class="text-[18px] font-black text-text mb-3 px-1">Ближайший визит</h3>
                <div class="bg-white card p-5 cursor-pointer hover:scale-[1.02] transition-transform border border-gray-100">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full overflow-hidden bg-gray-100 shrink-0">
                            <img src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2?q=80&w=150&auto=format&fit=crop" class="w-full h-full object-cover grayscale opacity-80">
                        </div>
                        <div class="flex-1">
                            <h4 class="text-[15px] font-black text-text">Чистка AirFlow</h4>
                            <p class="text-[12px] font-bold text-muted mt-0.5">Магомедова И.М.</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[14px] font-black text-acidBlue">15 мая</p>
                            <p class="text-[12px] font-bold text-muted mt-0.5">14:00</p>
                        </div>
                    </div>
                </div>
            </div>

        </main>

        <!-- Floating CTA -->
        <div style="position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 9999;">
            <div style="width: 100%; max-width: 360px; padding: 0 20px;">
                <button class="w-full bg-text text-white py-4 rounded-full text-[16px] font-black shadow-[0_12px_24px_rgba(0,0,0,0.2)] hover:scale-[1.02] transition-transform">
                    Новая запись
                </button>
            </div>
        </div>

    </div>

</body>
</html>
